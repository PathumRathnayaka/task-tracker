spring.application.name=task-tracker

spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/task_tracker}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.port=${SERVER_PORT:8080}

app.jwt.secret=${JWT_SECRET:ZGV2LW9ubHktY2hhbmdlLW1lLXRhc2stdHJhY2tlci1qd3Qtc2lnbmluZy1zZWNyZXQta2V5LTAwMDE=}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
